<!DOCTYPE html>
<html>

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shop Management Test</title>

    <script id="sap-ushell-config">
        window["sap-ushell-config"] = {
            defaultRenderer: "fiori2",
            renderers: {
                fiori2: {
                    componentData: {
                        config: {
                            rootIntent: "Shell-home",
                            enableHidePersonalization: true,
                            // Fixes the 'synchronous' warning in your logs
                            async: true
                        }
                    }
                }
            },
            services: {
                NavTargetResolution: {
                    config: {
                        "enableCatalogSearch": false,
                        "enableClientSideTargetResolution": true
                    }
                },
                LaunchPage: {
                    config: {
                        groups: [{
                            id: "main_group",
                            title: "Retail Management",
                            isPreset: true,
                            isVisible: true,
                            tiles: [
                                {
                                    id: "managecustomer",
                                    tileType: "sap.ushell.ui.tile.StaticTile",
                                    properties: {
                                        title: "Manage Customers",
                                        icon: "sap-icon://shipping-status",
                                        targetURL: "#Distributor-manage"
                                    }
                                },
                                {
                                    id: "managedistributor",
                                    tileType: "sap.ushell.ui.tile.StaticTile",
                                    properties: {
                                        title: "Manage Distributors",
                                        subtitle: "Wholesale Partners",
                                        icon: "sap-icon://shipping-status",
                                        targetURL: "#Distributor-manage"
                                    }
                                }
                            ]
                        }]
                    }
                }
            },
            applications: {
                "Customer-manage": {
                    "additionalInformation": "SAPUI5.Component=managecustomer",
                    "applicationType": "URL",
                    "url": "/manage-customer/webapp",
                    "description": "Retail Shop Customers",
                    "icon": "sap-icon://person-placeholder"
                },
                "Distributor-manage": {
                    "additionalInformation": "SAPUI5.Component=managedistributor",
                    "applicationType": "URL",
                    "url": "/manage-distributor/webapp",
                    "description": "Wholesale Partners",
                    "icon": "sap-icon://shipping-status"
                },
                "DistributorPortal-manage": {
                    "additionalInformation": "SAPUI5.Component=distributoraccessportal",
                    "applicationType": "URL",
                    "url": "/distributor-access-portal/webapp",
                    "description": "Wholesale Partners",
                    "icon": "sap-icon://shipping-status"
                },
                "Inventory-manage": {
                    "additionalInformation": "SAPUI5.Component=inventory",
                    "applicationType": "URL",
                    "url": "/inventory/webapp",
                    "description": "Manage Stocks",
                    "icon": "sap-icon://shipping-status"
                },
                "RetailLedger-manage": {
                    "additionalInformation": "SAPUI5.Component=ledger",
                    "applicationType": "URL",
                    "url": "/ledger/webapp",
                    "description": "CREDITS / DEBITS",
                    "icon": "sap-icon://shipping-status"
                },
                "Categories-manage": {
                    "additionalInformation": "SAPUI5.Component=managecategories",
                    "applicationType": "URL",
                    "url": "/manage-categories/webapp",
                    "description": "Categories - Items",
                    "icon": "sap-icon://shipping-status"
                },
                "GR-manage": {
                    "additionalInformation": "SAPUI5.Component=managegr",
                    "applicationType": "URL",
                    "url": "/manage-gr/webapp",
                    "description": "Goods Receipts",
                    "icon": "sap-icon://shipping-status"
                },
                "PO-manage": {
                    "additionalInformation": "SAPUI5.Component=managepos",
                    "applicationType": "URL",
                    "url": "/manage-pos/webapp",
                    "description": "Purchase Orders",
                    "icon": "sap-icon://shipping-status"
                },
                "Sales-manage": {
                    "additionalInformation": "SAPUI5.Component=sales",
                    "applicationType": "URL",
                    "url": "/sales/webapp",
                    "description": "Sales and Returns",
                    "icon": "sap-icon://shipping-status"
                }

            }
        };
    </script>


    <script src="https://ui5.sap.com/test-resources/sap/ushell/bootstrap/sandbox.js">
    </script>


    <script src="https://ui5.sap.com/resources/sap-ui-core.js" data-sap-ui-theme="sap_horizon"
        data-sap-ui-libs="sap.m, sap.ushell, sap.ui.core, sap.ui.layout" data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true">
        </script>

    <!-- Renderer Init -->
    <script>
        sap.ui.getCore().attachInit(function () {
            sap.ushell.Container.createRenderer(true).then(function (oRenderer) {
                oRenderer.placeAt("content");
            });
        });
    </script>
