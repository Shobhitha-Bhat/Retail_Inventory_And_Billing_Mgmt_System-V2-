_schema-version: 3.3.0
ID: retail_inventory_and_billing_mgmt_system_v2
version: 1.0.1
description: "Welcome to your new CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: retail_inventory_and_billing_mgmt_system_v2-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: retail_inventory_and_billing_mgmt_system_v2-auth
      - name: retail_inventory_and_billing_mgmt_system_v2-db
      - name: retail_inventory_and_billing_mgmt_system_v2-destination

  - name: retail_inventory_and_billing_mgmt_system_v2-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: retail_inventory_and_billing_mgmt_system_v2-db

  - name: retail_inventory_and_billing_mgmt_system_v2-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: retail_inventory_and_billing_mgmt_system_v2-auth
      - name: srv-api
      - name: retail_inventory_and_billing_mgmt_system_v2-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: retail_inventory_and_billing_mgmt_system_v2distributoraccessportal
          artifacts:
            - distributor-access-portal.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2inventory
          artifacts:
            - inventory.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2ledger
          artifacts:
            - ledger.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2managecategories
          artifacts:
            - manage-categories.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2managecustomer
          artifacts:
            - manage-customer.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2managedistributor
          artifacts:
            - manage-distributor.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2managegr
          artifacts:
            - manage-gr.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2managepos
          artifacts:
            - manage-pos.zip
          target-path: app/
        - name: retail_inventory_and_billing_mgmt_system_v2sales
          artifacts:
            - sales.zip
          target-path: app/

  - name: retail_inventory_and_billing_mgmt_system_v2distributoraccessportal
    type: html5
    path: app/distributor-access-portal
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2inventory
    type: html5
    path: app/inventory
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2ledger
    type: html5
    path: app/ledger
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2managecategories
    type: html5
    path: app/manage-categories
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2managecustomer
    type: html5
    path: app/manage-customer
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2managedistributor
    type: html5
    path: app/manage-distributor
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2managegr
    type: html5
    path: app/manage-gr
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2managepos
    type: html5
    path: app/manage-pos
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []
  - name: retail_inventory_and_billing_mgmt_system_v2sales
    type: html5
    path: app/sales
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build
      supported-platforms: []

  - name: retail_inventory_and_billing_mgmt_system_v2-destinations
    type: com.sap.application.content
    requires:
      - name: retail_inventory_and_billing_mgmt_system_v2-auth
        parameters:
          service-key:
            name: retail_inventory_and_billing_mgmt_system_v2-auth-key
      - name: retail_inventory_and_billing_mgmt_system_v2-html5-repo-host
        parameters:
          service-key:
            name: retail_inventory_and_billing_mgmt_system_v2-html5-repo-host-key
      - name: srv-api
      - name: retail_inventory_and_billing_mgmt_system_v2-destination
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: retail_inventory_and_billing_mgmt_system_v2-html5-repository
              ServiceInstanceName: retail_inventory_and_billing_mgmt_system_v2-html5-repo-host
              ServiceKeyName: retail_inventory_and_billing_mgmt_system_v2-html5-repo-host-key
              sap.cloud.service: retail_inventory_and_billing_mgmt_system_v2.service
            - Name: retail_inventory_and_billing_mgmt_system_v2-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: retail_inventory_and_billing_mgmt_system_v2-auth
              ServiceKeyName: retail_inventory_and_billing_mgmt_system_v2-auth-key
              sap.cloud.service: retail_inventory_and_billing_mgmt_system_v2.service
  - name: retail_inventory_and_billing_mgmt_system_v2
    type: approuter.nodejs
    path: app/router
    parameters:
      keep-existing-routes: true
      disk-quota: 256M
      memory: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api # must be used in xs-app.json as well
          url: ~{srv-url}
          forwardAuthToken: true
      - name: retail_inventory_and_billing_mgmt_system_v2-auth
      - name: retail_inventory_and_billing_mgmt_system_v2-destination
      - name: retail_inventory_and_billing_mgmt_system_v2-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  - name: retail_inventory_and_billing_mgmt_system_v2-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: retail_inventory_and_billing_mgmt_system_v2-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api
  - name: retail_inventory_and_billing_mgmt_system_v2-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: retail_inventory_and_billing_mgmt_system_v2-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: srv-api
                URL: ~{srv-api/srv-url}
                Authentication: NoAuthentication
                Type: HTTP
                ProxyType: Internet
                HTML5.ForwardAuthToken: true
                HTML5.DynamicDestination: true
    requires:
      - name: srv-api

  - name: retail_inventory_and_billing_mgmt_system_v2-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: retail_inventory_and_billing_mgmt_system_v2-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
